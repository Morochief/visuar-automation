# =============================================================
# VISUAR Market Intelligence - Docker Compose Production
# Designed for Hostinger VPS deployment
# =============================================================

services:
  # ─────────────────────────────────────────────────
  # BACKEND: Scraper + API Server
  # - Cron every 6h for automated scraping
  # - Flask API on port 5000 for on-demand triggers
  # - Outputs JSON to shared volume for frontend
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visuar_scraper
    environment:
      - DATABASE_URL=postgresql://visuar_admin:visuar_pass@postgres:5432/market_intel_db
      - JSON_OUTPUT_DIR=/app/output
      - API_PORT=5000
      - PYTHONUNBUFFERED=1
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FLASK_ENV=${FLASK_ENV:-development}
    volumes:
      - scraper_data:/app/data
      - shared_json:/app/output
    restart: unless-stopped
    networks:
      - visuar_network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────
  # DATABASE: PostgreSQL 15
  # Engine for market intelligence history & metrics
  # ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: visuar_postgres
    environment:
      - POSTGRES_USER=visuar_admin
      - POSTGRES_PASSWORD=visuar_pass
      - POSTGRES_DB=market_intel_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - visuar_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visuar_admin -d market_intel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────
  # FRONTEND: Astro + React SSR Dashboard
  # Reads JSON data from shared volume
  # ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend_app
      dockerfile: Dockerfile
    container_name: visuar_dashboard
    ports:
      - "${FRONTEND_PORT:-4321}:4321"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - DATABASE_URL=postgresql://visuar_admin:visuar_pass@postgres:5432/market_intel_db
    volumes:
      - shared_json:/app/public/api
      - ./frontend_app/src:/app/src:ro
      - ./frontend_app/astro.config.mjs:/app/astro.config.mjs:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - visuar_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─────────────────────────────────────────────────
  # NGINX: Reverse Proxy
  # Routes /backend/* to API, everything else to frontend
  # ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: visuar_proxy
    ports:
      - "8080:80"
      - "4443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - visuar_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  pgdata:
    driver: local
  scraper_data:
    driver: local
  shared_json:
    driver: local
  nginx_cache:
    driver: local

networks:
  visuar_network:
    driver: bridge
